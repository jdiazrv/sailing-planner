project_id = "sailing-planner"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/auth/callback",
  "http://127.0.0.1:3000/auth/callback",
  "https://sail-planner.netlify.com/auth/callback",
  "https://sail-planner.netlify.app/auth/callback"
]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.email.template.invite]
subject = "{{ if eq .Data.preferred_language \"en\" }}You have been invited to Sailing Planner{{ else }}Te han invitado a Sailing Planner{{ end }}"
content_path = "./supabase/templates/invite.html"

[auth.email.template.magic_link]
subject = "{{ if eq .Data.preferred_language \"en\" }}Your magic link to Sailing Planner{{ else }}Tu enlace de acceso a Sailing Planner{{ end }}"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.confirmation]
subject = "{{ if eq .Data.preferred_language \"en\" }}Confirm your Sailing Planner account{{ else }}Confirma tu cuenta de Sailing Planner{{ end }}"
content_path = "./supabase/templates/confirm_signup.html"
