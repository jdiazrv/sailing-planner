<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boat Icon Preview</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background:
        radial-gradient(circle at top left, rgba(0, 180, 216, 0.08), transparent 28%),
        linear-gradient(135deg, #0e1520 0%, #0c1829 48%, #0e1520 100%);
      color: #e2e8f0;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
    }

    .card {
      width: min(680px, 100%);
      padding: 2rem;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(20, 30, 46, 0.92);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.30);
    }

    .eyebrow {
      margin: 0 0 .5rem;
      color: #00b4d8;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 .5rem;
      font-size: 1.5rem;
    }

    p {
      margin: 0;
      color: #94a3b8;
      line-height: 1.6;
    }

    .preview {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .tile {
      display: grid;
      gap: .9rem;
      justify-items: center;
      padding: 1.25rem 1rem;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.03);
    }

    .tile svg {
      color: #00b4d8;
    }

    .tile span {
      font-size: .82rem;
      font-weight: 600;
      color: #cbd5e1;
    }

    .nav-chip {
      display: inline-flex;
      align-items: center;
      gap: .6rem;
      padding: .55rem .75rem;
      border-radius: 10px;
      background: rgba(0, 180, 216, 0.14);
      color: #00b4d8;
      font-weight: 600;
    }

    .nav-chip svg {
      width: 18px;
      height: 18px;
    }

    @media (max-width: 640px) {
      .preview {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="eyebrow">Preview</p>
    <h1>Icono propuesto para Barcos</h1>
    <p>No está implantado en la app todavía. Aquí lo ves en tamaño grande y en el tamaño real del sidebar.</p>

    <section class="preview">
      <article class="tile">
        <svg width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 3v12" />
          <path d="M11 4L6.5 13H11" />
          <path d="M11 6.5L17.2 13H11" />
          <path d="M4 15.5h14.5" />
          <path d="M6 18c2.1 1.3 4 1.8 6 1.8s3.9-.5 6-1.8" />
        </svg>
        <span>Vista ampliada</span>
      </article>

      <article class="tile">
        <div class="nav-chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 3v12" />
            <path d="M11 4L6.5 13H11" />
            <path d="M11 6.5L17.2 13H11" />
            <path d="M4 15.5h14.5" />
            <path d="M6 18c2.1 1.3 4 1.8 6 1.8s3.9-.5 6-1.8" />
          </svg>
          <span>Barcos</span>
        </div>
        <span>Tamaño sidebar</span>
      </article>

      <article class="tile">
        <img src="/boat-icon-sail-preview.svg" alt="Icono de velero" width="72" height="72" />
        <span>Archivo SVG</span>
      </article>
    </section>
  </main>
</body>
</html>
